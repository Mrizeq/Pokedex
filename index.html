<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<title>Pokemon Sword Galar Tracker</title>

<link rel="stylesheet" href="css/styles.css?v=20260308-2">

</head>

<body>

<div class="app">

<div class="topbar">
<h1>Pok&eacute;dex Tracker</h1>
<div class="auth-controls">
<span id="userInfo"></span>
<button id="loginBtn">Continue with Google</button>
<button id="logoutBtn" style="display:none;">Logout</button>
</div>
</div>

<div class="controls" aria-label="Table controls">
<input id="search" placeholder="Search Pok&eacute;mon" aria-label="Search Pokemon">
<div class="filters" role="group" aria-label="Quick filters">
<button type="button" class="filter-btn active" data-filter="all">All</button>
<button type="button" class="filter-btn" data-filter="caught">Caught</button>
<button type="button" class="filter-btn" data-filter="not-caught">Not Caught</button>
<button type="button" class="filter-btn" data-filter="has-stone">Has Stone</button>
<button type="button" class="filter-btn" data-filter="final-evo">Final Evo</button>
</div>
</div>

<p id="tableStatus" class="table-status" role="status" aria-live="polite">Loading Pok&eacute;dex data...</p>
<div id="errorState" class="error-state" hidden>
<p>Could not load data. Please try again.</p>
<button id="retryBtn" type="button">Retry</button>
</div>
<p id="emptyState" class="empty-state" hidden>No Pok&eacute;mon match your current filters.</p>

<div class="table-wrap">
<table id="dex">

<thead>
<tr>
<th><button class="sort-btn" type="button" data-sort="id">#</button></th>
<th>Sprite</th>
<th><button class="sort-btn" type="button" data-sort="name">Pokemon</button></th>
<th><button class="sort-btn" type="button" data-sort="evolution">Evolution</button></th>
<th><button class="sort-btn" type="button" data-sort="stone">Stone</button></th>
<th><button class="sort-btn" type="button" data-sort="obtain">Obtain</button></th>
<th>Location</th>
<th><button class="sort-btn" type="button" data-sort="caught">Caught</button></th>
</tr>
</thead>

<tbody></tbody>

</table>
</div>

<script type="module" src="js/app.js?v=20260308-2"></script>

</body>

</html>
